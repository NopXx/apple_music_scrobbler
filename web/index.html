<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>♪ Apple Music Scrobbler</title>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="/i18n.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #0f172a;
    --c2: #1e1b4b;
    --c3: #312e81;
    --accent-red: #fc5c7d;
    --accent-blue: #6a82fb;
    --accent-gradient: linear-gradient(100deg, var(--accent-red), var(--accent-blue));
    --glass-bg: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --text: #fff;
    --text-dim: rgba(255,255,255,0.55);
    --text-faint: rgba(255,255,255,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    background: #000;
  }

  /* Ambient backdrop — blurred artwork fills viewport */
  .backdrop {
    position: fixed; inset: -10%; z-index: -2;
    background-size: cover; background-position: center;
    filter: blur(80px) saturate(160%);
    transform: scale(1.15);
    transition: background-image 1.2s ease, opacity 1.2s ease;
    opacity: 0.55;
  }
  .backdrop::after {
    content: ''; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at top, transparent, rgba(0,0,0,0.35) 70%),
      linear-gradient(180deg, rgba(0,0,0,0.25) 0%, rgba(0,0,0,0.55) 100%);
  }
  .gradient-fallback {
    position: fixed; inset: 0; z-index: -3;
    background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 50%, var(--c3) 100%);
    transition: background 1.2s ease;
  }

  .container { max-width: 1080px; margin: 0 auto; padding: 40px 28px 80px; }

  /* Top bar */
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 56px;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
  }
  .brand .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-gradient);
    box-shadow: 0 0 14px var(--accent-red);
  }
  .nav { display: flex; gap: 10px; }
  .nav a, .icon-btn {
    color: var(--text); text-decoration: none;
    font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
    padding: 9px 16px; border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    transition: all 0.2s ease;
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer;
  }
  .nav a:hover, .icon-btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }

  /* Hero now-playing */
  .hero {
    display: grid;
    grid-template-columns: minmax(260px, 380px) 1fr;
    gap: 56px;
    align-items: center;
    margin-bottom: 72px;
  }
  @media (max-width: 760px) {
    .hero { grid-template-columns: 1fr; gap: 32px; text-align: center; }
    .hero-info { align-items: center !important; }
    .progress-block { max-width: 100%; }
  }

  .artwork-wrap {
    position: relative; aspect-ratio: 1; width: 100%;
  }
  .artwork {
    position: relative; width: 100%; height: 100%;
    border-radius: 28px; overflow: hidden;
    background: linear-gradient(135deg, #222, #0a0a0a);
    box-shadow:
      0 30px 80px rgba(0,0,0,0.6),
      0 0 120px color-mix(in srgb, var(--accent-red) 40%, transparent),
      inset 0 0 0 1px rgba(255,255,255,0.1);
    transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 1s ease;
    display: flex; align-items: center; justify-content: center;
  }
  .artwork img, .artwork video {
    width: 100%; height: 100%; object-fit: cover;
    transition: opacity 0.6s ease;
  }
  .artwork-glow {
    position: absolute; inset: -20%; z-index: -1;
    background: radial-gradient(circle, color-mix(in srgb, var(--accent-blue) 50%, transparent), transparent 65%);
    filter: blur(40px); opacity: 0.7;
    transition: background 1.2s ease;
  }

  .hero-info {
    display: flex; flex-direction: column; align-items: flex-start;
    gap: 8px; min-width: 0;
  }
  .eyebrow {
    font-size: 10px; font-weight: 700; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--text-faint);
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px;
  }
  .eyebrow .live-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #34d399;
    box-shadow: 0 0 10px #34d399;
    animation: pulse 2s ease-in-out infinite;
  }
  .eyebrow .live-dot.off { background: #888; box-shadow: none; animation: none; }
  @keyframes pulse { 50% { opacity: 0.4; } }

  .track-name {
    font-size: clamp(32px, 5vw, 56px); font-weight: 800;
    letter-spacing: -0.03em; line-height: 1.05;
    margin-bottom: 4px;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .artist {
    font-size: clamp(16px, 2vw, 20px); font-weight: 600;
    color: var(--text); opacity: 0.9;
    margin-bottom: 2px;
  }
  .album {
    font-size: 13px; font-weight: 500; color: var(--text-dim);
    margin-bottom: 20px;
  }

  .status-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
  .badge {
    padding: 6px 12px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }
  .badge.ok { background: rgba(16,185,129,0.15); color: #6ee7b7; border-color: rgba(16,185,129,0.25); }
  .badge.scrobbled { background: rgba(251,191,36,0.15); color: #fcd34d; border-color: rgba(251,191,36,0.25); }

  .progress-block { width: 100%; max-width: 560px; }
  .progress-bar {
    position: relative; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 999px; overflow: visible;
    cursor: default;
  }
  .progress-fill {
    height: 100%; background: var(--accent-gradient);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .progress-fill::after {
    content: ''; position: absolute; right: -5px; top: 50%;
    width: 12px; height: 12px; border-radius: 50%;
    background: #fff; transform: translateY(-50%);
    box-shadow: 0 0 0 4px color-mix(in srgb, var(--accent-red) 30%, transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .progress-bar:hover .progress-fill::after { opacity: 1; }
  .scrobble-mark {
    position: absolute; top: -4px; width: 2px; height: 12px;
    background: rgba(255,255,255,0.5); border-radius: 1px;
    z-index: 2;
  }
  .time-row {
    display: flex; justify-content: space-between;
    font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums;
    color: var(--text-faint); margin-top: 10px;
    letter-spacing: 0.05em;
  }

  .actions { display: flex; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
  .action-btn {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff; font-family: inherit;
    font-size: 12px; font-weight: 600;
    padding: 10px 16px; border-radius: 999px;
    cursor: pointer; backdrop-filter: blur(10px);
    transition: all 0.2s ease;
  }
  .action-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
    transform: translateY(-1px);
  }
  .action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Idle state */
  .idle {
    text-align: center; padding: 120px 40px;
    color: var(--text-dim); font-size: 15px; font-weight: 500;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .idle .icon-pulse {
    width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    animation: pulse 2.5s ease-in-out infinite;
  }

  /* History section */
  .section-header {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 20px; padding-bottom: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
  }
  .history-select {
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 999px;
    padding: 6px 12px; font-size: 11px; font-weight: 600;
    font-family: inherit; letter-spacing: 0.05em;
    cursor: pointer; outline: none; transition: all 0.2s;
  }
  .history-select:hover { background: rgba(255,255,255,0.1); }

  .history-list { display: flex; flex-direction: column; }
  .history-item {
    display: grid;
    grid-template-columns: 48px 50px 1fr auto auto;
    gap: 16px;
    align-items: center;
    padding: 12px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background 0.2s ease;
    border-radius: 8px;
  }
  .history-item:hover {
    background: rgba(255,255,255,0.04);
    padding-left: 12px; padding-right: 12px;
  }
  .history-item:last-child { border-bottom: none; }
  .history-time {
    font-size: 11px; font-variant-numeric: tabular-nums;
    color: var(--text-faint); font-weight: 600;
  }
  .history-tag {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .tag-play { background: rgba(16,185,129,0.12); color: #6ee7b7; }
  .tag-replay { background: rgba(252,92,125,0.12); color: #fc5c7d; }
  .tag-scrobble { background: rgba(251,191,36,0.12); color: #fcd34d; }
  .history-content { min-width: 0; }
  .history-title {
    font-size: 14px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .history-artist {
    font-size: 12px; color: var(--text-dim);
    font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .history-event {
    font-size: 10px; font-weight: 700; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--text-faint);
  }
  .history-edit {
    opacity: 0; transition: opacity 0.2s;
    background: transparent; border: none; color: var(--text-dim);
    cursor: pointer; padding: 6px; border-radius: 8px;
  }
  .history-item:hover .history-edit { opacity: 1; }
  .history-edit:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .history-empty {
    padding: 40px; text-align: center; color: var(--text-dim); font-size: 14px;
  }

  /* Modals */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(20px);
    animation: fadeIn 0.2s ease;
  }
  .modal-backdrop.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: rgba(20, 20, 28, 0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px; padding: 28px;
    width: 92%; max-width: 480px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    animation: slideUp 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h3 {
    font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.6);
    margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
  }
  .form-row { margin-bottom: 14px; }
  .form-row label {
    display: block; font-size: 10px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-faint); margin-bottom: 6px;
  }
  .form-row input {
    width: 100%; padding: 12px 14px; font-size: 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #fff; font-family: inherit;
    transition: border-color 0.2s;
  }
  .form-row input:focus { outline: none; border-color: var(--accent-red); }
  .orig { font-size: 11px; color: var(--text-faint); margin-top: 6px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px; }
  .modal-btn {
    padding: 10px 18px; border-radius: 999px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    border: 1px solid transparent; font-family: inherit;
    transition: all 0.2s;
  }
  .modal-btn.primary { background: var(--accent-gradient); color: #fff; }
  .modal-btn.ghost { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.1); }
  .modal-btn:hover { transform: translateY(-1px); }

  /* Artwork grid */
  .artwork-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px; margin-top: 16px; max-height: 420px; overflow-y: auto;
    padding: 4px;
  }
  .artwork-item {
    cursor: pointer; position: relative; border-radius: 14px; overflow: hidden;
    aspect-ratio: 1; background: rgba(0,0,0,0.3);
    border: 2px solid transparent; transition: all 0.2s ease;
  }
  .artwork-item:hover { transform: scale(1.03); border-color: var(--accent-red); }
  .artwork-item img { width: 100%; height: 100%; object-fit: cover; }
  .artwork-item .item-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    padding: 20px 8px 6px; font-size: 10px; font-weight: 500;
    opacity: 0; transition: opacity 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .artwork-item:hover .item-info { opacity: 1; }
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input {
    flex: 1; padding: 10px 14px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; color: #fff; font-family: inherit; font-size: 13px;
  }
  .search-row input:focus { outline: none; border-color: var(--accent-red); }

  /* Loading/Spinner */
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--accent-red);
    border-radius: 50%;
    animation: am-spin 0.8s linear infinite;
  }
  @keyframes am-spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10; border-radius: inherit;
    animation: fadeIn 0.2s ease;
  }

  /* Icons */
  .lucide {
    width: 14px; height: 14px; stroke-width: 2px;
    display: inline-block;
  }
</style>
</head>
<body>
<div class="gradient-fallback"></div>
<div class="backdrop" id="backdrop"></div>

<div class="container">
  <div class="topbar">
    <div class="brand"><span class="dot"></span> Apple Music Scrobbler</div>
    <div class="nav">
      <a href="/settings.html"><i data-lucide="settings-2"></i> <span data-i18n="nav.settings">Settings</span></a>
    </div>
  </div>

  <!-- Idle state -->
  <div id="idle-view" class="idle">
    <div class="icon-pulse"><i data-lucide="music" style="width:24px;height:24px;opacity:0.5"></i></div>
    <div data-i18n="player.idle">ยังไม่ได้เล่นเพลง — เปิด Apple Music แล้วกด play</div>
  </div>

  <!-- Now playing hero -->
  <div class="hero" id="np-view" style="display:none;">
    <div class="artwork-wrap">
      <div class="artwork-glow" id="artwork-glow"></div>
      <div class="artwork" id="artwork">
        <i data-lucide="music" style="width:64px;height:64px;opacity:0.2"></i>
      </div>
    </div>

    <div class="hero-info">
      <div class="eyebrow">
        <span class="live-dot" id="live-dot"></span>
        <span id="eyebrow-text" data-i18n="player.now_playing">Now Playing</span>
      </div>
      <h1 class="track-name" id="track-name">—</h1>
      <div class="artist" id="artist">—</div>
      <div class="album" id="album">—</div>

      <div class="status-row">
        <span class="badge" id="state-badge">—</span>
        <span class="badge" id="scrobble-badge" data-i18n="player.wait_scrobble">รอ Scrobble</span>
      </div>

      <div class="progress-block">
        <div class="progress-bar">
          <div class="progress-fill" id="progress" style="width:0%;"></div>
          <div class="scrobble-mark" id="scrobble-mark" style="display:none;"></div>
        </div>
        <div class="time-row">
          <span id="t-cur">0:00</span>
          <span id="t-dur">0:00</span>
        </div>
      </div>

      <div class="actions">
        <button class="action-btn" id="btn-reload" data-i18n-title="player.change_artwork_tip" title="ดึงรูปปกใหม่">
          <i data-lucide="image"></i> <span data-i18n="player.change_artwork">Change artwork</span>
        </button>
        <button class="action-btn" id="btn-edit" data-i18n-title="player.edit_info_tip" title="แก้ข้อมูลเพลง">
          <i data-lucide="pencil-line"></i> <span data-i18n="player.edit_info">Edit info</span>
        </button>
      </div>
    </div>
  </div>

  <!-- History -->
  <div class="section">
    <div class="section-header">
      <div class="section-title" data-i18n="player.recent">Recent Activity</div>
      <select id="history-limit" class="history-select">
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </div>
    <div id="history" class="history-list">
      <div class="history-empty" data-i18n="player.no_history">ยังไม่มีประวัติ</div>
    </div>
  </div>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="edit-modal">
  <div class="modal">
    <h3><i data-lucide="pencil-line"></i> <span data-i18n="modal.edit_title">Edit Track Info</span></h3>
    <div class="form-row">
      <label data-i18n="modal.artist">Artist</label>
      <input type="text" id="edit-artist">
      <div class="orig" id="orig-artist"></div>
    </div>
    <div class="form-row">
      <label data-i18n="modal.track">Track</label>
      <input type="text" id="edit-track">
      <div class="orig" id="orig-track"></div>
    </div>
    <div class="form-row">
      <label data-i18n="modal.album">Album</label>
      <input type="text" id="edit-album">
      <div class="orig" id="orig-album"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn ghost" id="edit-cancel" data-i18n="common.cancel">ยกเลิก</button>
      <button class="modal-btn primary" id="edit-save" data-i18n="common.save">บันทึก</button>
    </div>
  </div>
</div>

<!-- Artwork modal -->
<div class="modal-backdrop" id="artwork-modal">
  <div class="modal" style="max-width: 600px;">
    <h3><i data-lucide="image"></i> <span data-i18n="modal.select_artwork">Select Artwork</span></h3>
    <div class="search-row">
      <input type="text" id="art-search-input" data-i18n-placeholder="modal.search_placeholder" placeholder="Search song or artist...">
      <button class="modal-btn primary" id="art-search-btn" data-i18n="common.search">Search</button>
    </div>
    <div class="artwork-grid" id="art-results">
      <div class="history-empty" style="grid-column: 1/-1;" data-i18n="modal.enter_song">กรอกชื่อเพลงเพื่อค้นหา...</div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn ghost" id="art-cancel" data-i18n="common.close">ปิด</button>
    </div>
  </div>
</div>

<script>
let scrobblePercent = 50;
let currentData = null;
let historyLimit = parseInt(localStorage.getItem('history-limit') || '10');
let currentArtworkUrl = null;
let localPosition = 0;
let localPositionSyncedAt = 0;

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break;
      case g: h = (b - r) / d + 2; break;
      case b: h = (r - g) / d + 4; break;
    }
    h *= 60;
  }
  return [h, s, l];
}

function hslToRgb(h, s, l) {
  h = ((h % 360) + 360) % 360;
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r = 0, g = 0, b = 0;
  if (h < 60) { r = c; g = x; }
  else if (h < 120) { r = x; g = c; }
  else if (h < 180) { g = c; b = x; }
  else if (h < 240) { g = x; b = c; }
  else if (h < 300) { r = x; b = c; }
  else { r = c; b = x; }
  return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
}
const rgbStr = rgb => `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`;

async function extractPalette(url) {
  return new Promise((resolve) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      try {
        const size = 48;
        const canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
        const data = ctx.getImageData(0, 0, size, size).data;
        const buckets = {};
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
          if (a < 200) continue;
          const [h, s, l] = rgbToHsl(r, g, b);
          if (s < 0.2 || l < 0.15 || l > 0.85) continue;
          const key = Math.round(h / 20) * 20;
          if (!buckets[key]) buckets[key] = { count: 0, h: 0, s: 0, l: 0 };
          buckets[key].count++;
          buckets[key].h += h;
          buckets[key].s += s;
          buckets[key].l += l;
        }
        const sorted = Object.values(buckets)
          .map(b => ({ count: b.count, h: b.h / b.count, s: b.s / b.count, l: b.l / b.count }))
          .sort((a, b) => b.count - a.count);
        if (sorted.length === 0) { resolve(null); return; }
        const primary = sorted[0];
        const secondary = sorted[1] || { h: primary.h + 40, s: primary.s, l: primary.l };
        resolve({ primary, secondary });
      } catch(e) { resolve(null); }
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}

async function applyTheme(url) {
  const root = document.documentElement.style;
  const backdrop = document.getElementById('backdrop');

  if (!url) {
    backdrop.style.backgroundImage = '';
    backdrop.style.opacity = '0';
    root.setProperty('--c1', '#0f172a');
    root.setProperty('--c2', '#1e1b4b');
    root.setProperty('--c3', '#312e81');
    root.setProperty('--accent-red', '#fc5c7d');
    root.setProperty('--accent-blue', '#6a82fb');
    currentArtworkUrl = null;
    return;
  }
  if (url === currentArtworkUrl) return;
  currentArtworkUrl = url;

  backdrop.style.backgroundImage = `url("${url}")`;
  backdrop.style.opacity = '0.55';

  const palette = await extractPalette(url);
  if (!palette) return;
  const { primary, secondary } = palette;
  const c1 = hslToRgb(primary.h, Math.min(primary.s, 0.6), 0.08);
  const c2 = hslToRgb(primary.h, Math.min(primary.s, 0.7), 0.18);
  const c3 = hslToRgb(secondary.h, Math.min(secondary.s, 0.7), 0.28);
  const accent1 = hslToRgb(primary.h, Math.max(primary.s, 0.6), 0.62);
  const accent2 = hslToRgb(secondary.h, Math.max(secondary.s, 0.6), 0.65);
  root.setProperty('--c1', rgbStr(c1));
  root.setProperty('--c2', rgbStr(c2));
  root.setProperty('--c3', rgbStr(c3));
  root.setProperty('--accent-red', rgbStr(accent1));
  root.setProperty('--accent-blue', rgbStr(accent2));
}

const editModal = document.getElementById('edit-modal');
const editArtist = document.getElementById('edit-artist');
const editTrack = document.getElementById('edit-track');
const editAlbum = document.getElementById('edit-album');
const origArtist = document.getElementById('orig-artist');
const origTrack = document.getElementById('orig-track');
const origAlbum = document.getElementById('orig-album');

function openEditModal(original_artist, original_track, current_artist, current_track, current_album) {
  const op = t('common.original_prefix');
  origArtist.textContent = op + (original_artist || '—');
  origTrack.textContent = op + (original_track || '—');
  origAlbum.textContent = op + (current_album || '—');
  editArtist.value = current_artist || original_artist || '';
  editTrack.value = current_track || original_track || '';
  editAlbum.value = current_album || '';
  editModal.dataset.origArtist = original_artist;
  editModal.dataset.origTrack = original_track;
  editModal.classList.add('show');
}
function closeEditModal() { editModal.classList.remove('show'); }
function editFromHistory(artist, track, album) { openEditModal(artist, track, artist, track, album); }

document.getElementById('edit-cancel').addEventListener('click', closeEditModal);
document.getElementById('edit-save').addEventListener('click', async () => {
  const payload = {
    original_artist: editModal.dataset.origArtist,
    original_track: editModal.dataset.origTrack,
    artist: editArtist.value.trim(),
    track: editTrack.value.trim(),
    album: editAlbum.value.trim()
  };
  try {
    const r = await fetch('/api/edits/upsert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const res = await r.json();
    if (res.ok) {
      closeEditModal();
      await fetch('/api/artwork/reload', { method: 'POST' });
      tick();
    }
  } catch(e) { console.error('Save failed', e); }
});

document.getElementById('btn-edit').addEventListener('click', () => {
  if (!currentData) return;
  openEditModal(
    currentData.original_artist || currentData.artist,
    currentData.original_name || currentData.name,
    currentData.artist,
    currentData.name,
    currentData.album
  );
});

document.getElementById('btn-reload').addEventListener('click', () => {
  if (!currentData) return;
  const modal = document.getElementById('artwork-modal');
  modal.classList.add('show');
  const input = document.getElementById('art-search-input');
  input.value = `${currentData.original_artist || currentData.artist} ${currentData.original_name || currentData.name}`;
  searchArtwork(input.value);
});

document.getElementById('art-cancel').addEventListener('click', () => {
  document.getElementById('artwork-modal').classList.remove('show');
});
document.getElementById('art-search-btn').addEventListener('click', () => {
  searchArtwork(document.getElementById('art-search-input').value);
});
document.getElementById('art-search-input').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchArtwork(e.target.value);
});

async function searchArtwork(term) {
  const host = document.getElementById('art-results');
  host.innerHTML = `<div class="history-empty" style="grid-column:1/-1;">${escapeHtml(t('common.searching'))}</div>`;
  try {
    const r = await fetch('/api/artwork/search?term=' + encodeURIComponent(term));
    const d = await r.json();
    if (!d.results || d.results.length === 0) {
      host.innerHTML = `<div class="history-empty" style="grid-column:1/-1;">${escapeHtml(t('modal.no_results'))}</div>`;
      return;
    }
    host.innerHTML = d.results.map((it, idx) => `
      <div class="artwork-item" onclick="selectArtwork(${idx})" id="art-item-${idx}">
        <img src="${it.artwork}" loading="lazy">
        <div class="item-info">${escapeHtml(it.track)} · ${escapeHtml(it.artist)}</div>
      </div>
    `).join('');
    window._lastArtResults = d.results;
  } catch(e) {
    host.innerHTML = `<div class="history-empty" style="grid-column:1/-1;">${escapeHtml(t('common.error_searching'))}</div>`;
  }
}

async function selectArtwork(idx) {
  const it = window._lastArtResults[idx];
  if (!it || !currentData) return;
  const item = document.getElementById('art-item-' + idx);
  
  // Show loading
  const overlay = document.createElement('div');
  overlay.className = 'loading-overlay';
  overlay.innerHTML = '<div class="spinner"></div>';
  item.appendChild(overlay);
  item.style.pointerEvents = 'none'; // Prevent double click
  
  const payload = {
    original_artist: currentData.original_artist || currentData.artist,
    original_track: currentData.original_name || currentData.name,
    artist: currentData.artist,
    track: currentData.name,
    album: currentData.album,
    media: { artwork: it.artwork, itunes_url: it.itunes_url }
  };
  try {
    const r = await fetch('/api/edits/upsert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    const res = await r.json();
    if (res.ok) {
      document.getElementById('artwork-modal').classList.remove('show');
      await fetch('/api/artwork/reload', { method: 'POST' });
      tick();
    } else {
      throw new Error(res.error || 'Failed');
    }
  } catch(e) {
    alert(t('modal.save_artwork_failed'));
    overlay.remove();
    item.style.pointerEvents = '';
  }
}

function renderArtwork(host, animationUrl, imageUrl) {
  const hasAnim = !!animationUrl;
  const hasImg = !!imageUrl;

  if (!hasAnim && !hasImg) {
    if (host.dataset.kind !== 'placeholder') {
      host.innerHTML = '<i data-lucide="music" style="width:64px;height:64px;opacity:0.2"></i>';
      host.dataset.kind = 'placeholder';
      host.dataset.src = '';
      lucide.createIcons();
    }
    return;
  }

  if (hasAnim) {
    if (host.dataset.kind === 'video' && host.dataset.src === animationUrl) return;
    host.innerHTML = '';
    const vid = document.createElement('video');
    vid.src = animationUrl;
    vid.autoplay = true;
    vid.loop = true;
    vid.muted = true;
    vid.playsInline = true;
    vid.setAttribute('playsinline', '');
    vid.style.opacity = '0';
    vid.addEventListener('loadeddata', () => { vid.style.opacity = '1'; });
    vid.addEventListener('error', () => {
      if (hasImg) renderImg(host, imageUrl);
    });
    if (hasImg) {
      const poster = new Image();
      poster.crossOrigin = 'anonymous';
      poster.src = imageUrl;
      vid.poster = imageUrl;
    }
    host.appendChild(vid);
    host.dataset.kind = 'video';
    host.dataset.src = animationUrl;
    return;
  }

  renderImg(host, imageUrl);
}

function renderImg(host, url) {
  if (host.dataset.kind === 'image' && host.dataset.src === url) return;
  host.innerHTML = '';
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = url;
  img.style.opacity = '0';
  img.onload = () => { img.style.opacity = '1'; };
  host.appendChild(img);
  host.dataset.kind = 'image';
  host.dataset.src = url;
}

const fmt = s => {
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s/60), ss = s%60;
  return m + ':' + String(ss).padStart(2,'0');
};

async function loadSettings() {
  try {
    const r = await fetch('/api/settings');
    const d = await r.json();
    scrobblePercent = d.scrobble.percent;
  } catch(e) {}
}

async function loadNowPlaying() {
  try {
    const r = await fetch('/api/nowplaying?t=' + Date.now());
    const d = await r.json();
    currentData = d;
    const idle = document.getElementById('idle-view');
    const np = document.getElementById('np-view');
    if (!d.playing && !d.name) {
      idle.style.display = 'flex';
      np.style.display = 'none';
      document.title = '♪ Apple Music Scrobbler';
      applyTheme(null);
      return;
    }
    idle.style.display = 'none';
    np.style.display = 'grid';

    document.getElementById('track-name').textContent = d.name || '—';
    document.getElementById('artist').textContent = d.artist || '—';
    document.getElementById('album').textContent = d.album || '';

    localPosition = d.position || 0;
    localPositionSyncedAt = Date.now();
    const pct = d.duration ? (localPosition / d.duration * 100) : 0;
    document.getElementById('progress').style.width = pct + '%';
    document.getElementById('t-cur').textContent = fmt(localPosition);
    document.getElementById('t-dur').textContent = fmt(d.duration || 0);

    const art = document.getElementById('artwork');
    renderArtwork(art, d.animation_url, d.artwork_url);
    applyTheme(d.artwork_url || null);
    art.classList.toggle('playing', !!d.playing);

    const liveDot = document.getElementById('live-dot');
    const eyebrowText = document.getElementById('eyebrow-text');
    liveDot.classList.toggle('off', !d.playing);
    eyebrowText.textContent = d.playing ? t('player.now_playing') : t('player.paused');

    const mark = document.getElementById('scrobble-mark');
    if (d.duration > 30) {
      mark.style.display = 'block';
      mark.style.left = scrobblePercent + '%';
    } else {
      mark.style.display = 'none';
    }

    const stateBadge = document.getElementById('state-badge');
    stateBadge.innerHTML = `<i data-lucide="${d.playing ? 'play' : 'pause'}"></i> ${escapeHtml(d.playing ? t('player.playing_badge') : t('player.paused_badge'))}`;
    stateBadge.className = 'badge ' + (d.playing ? 'ok' : '');

    const scrobbleBadge = document.getElementById('scrobble-badge');
    if (d.has_scrobbled) {
      scrobbleBadge.innerHTML = `<i data-lucide="check-circle-2"></i> ${escapeHtml(t('player.scrobbled'))}`;
      scrobbleBadge.className = 'badge scrobbled';
    } else {
      scrobbleBadge.innerHTML = '<i data-lucide="clock"></i> ' + Math.floor(d.scrobble_percent || 0) + '%';
      scrobbleBadge.className = 'badge';
    }

    lucide.createIcons();
    document.title = (d.playing ? '▶ ' : '⏸ ') + d.name + ' — ' + d.artist;
  } catch(e) {}
}

async function loadHistory() {
  try {
    const r = await fetch(`/api/history?limit=${historyLimit}&t=${Date.now()}`);
    const d = await r.json();
    const events = (d.events || []).filter(e => ['play', 'replay', 'scrobble'].includes(e.event_type));
    const host = document.getElementById('history');
    if (events.length === 0) {
      host.innerHTML = `<div class="history-empty">${escapeHtml(t('player.no_history'))}</div>`;
      return;
    }
    const tagMap = {
      'play':     { cls: 'tag-play',     icon: 'music',          label: t('event.play') },
      'replay':   { cls: 'tag-replay',   icon: 'repeat',         label: t('event.replay') },
      'scrobble': { cls: 'tag-scrobble', icon: 'check-circle-2', label: t('event.scrobbled') },
    };
    host.innerHTML = events.map(e => {
      const info = tagMap[e.event_type] || tagMap.play;
      const date = new Date(e.timestamp * 1000);
      const time = String(date.getHours()).padStart(2,'0') + ':' + String(date.getMinutes()).padStart(2,'0');
      return `<div class="history-item">
        <span class="history-time">${time}</span>
        <div class="history-tag ${info.cls}"><i data-lucide="${info.icon}" style="width:16px;height:16px;"></i></div>
        <div class="history-content">
          <div class="history-title">${escapeHtml(e.track_name)}</div>
          <div class="history-artist">${escapeHtml(e.artist_name)}</div>
        </div>
        <span class="history-event">${info.label}</span>
        <button class="history-edit" onclick="editFromHistory('${escapeAttr(e.artist_name)}', '${escapeAttr(e.track_name)}', '${escapeAttr(e.album_name)}')" title="Edit">
          <i data-lucide="pencil-line" style="width:14px;height:14px;"></i>
        </button>
      </div>`;
    }).join('');
    lucide.createIcons();
  } catch(e) {}
}

function escapeAttr(s) {
  return String(s || '').replace(/'/g, "&#39;").replace(/"/g, "&quot;");
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function tick() { await loadNowPlaying(); await loadHistory(); lucide.createIcons(); }

document.getElementById('history-limit').value = historyLimit;
document.getElementById('history-limit').addEventListener('change', (e) => {
  historyLimit = parseInt(e.target.value);
  localStorage.setItem('history-limit', historyLimit);
  loadHistory().then(() => lucide.createIcons());
});

function tickLocal() {
  if (!currentData || !currentData.playing || !currentData.duration) return;
  const elapsed = (Date.now() - localPositionSyncedAt) / 1000;
  const pos = Math.min(localPosition + elapsed, currentData.duration);
  const pct = pos / currentData.duration * 100;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('t-cur').textContent = fmt(pos);
}

loadSettings().then(tick);
setInterval(tick, 2000);
setInterval(tickLocal, 1000);

// Re-render dynamic strings when language changes
window.addEventListener('ams:lang', () => { tick(); });
</script>
